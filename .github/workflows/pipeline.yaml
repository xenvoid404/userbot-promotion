name: CI/CD Pipeline

on:
    push:
        branches: ['main']
        tags: ['v*']
    pull_request:
        branches: ['main']

jobs:
    build:
        name: 🛠️ Build & Verify
        runs-on: ubuntu-latest

        steps:
            - name: 📥 Checkout Repository
              uses: actions/checkout@v4

            - name: 🐹 Setup Go Environment
              uses: actions/setup-go@v5
              with:
                  go-version: '1.26.2'
                  cache: true

            - name: ⚙️ Install System Dependencies
              run: sudo apt-get update && sudo apt-get install -y gcc

            - name: 🔍 Check Go Info & Environment
              run: |
                  go version
                  echo "Memastikan environment siap untuk build..."

            - name: 📦 Sync Dependencies
              run: make tidy

            - name: 🏗️ Compile Binary Linux
              run: make build

            - name: 📝 Generate Build Summary
              run: |
                  echo "### ✅ Build Berhasil! 🚀" >> $GITHUB_STEP_SUMMARY
                  echo "- **Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Branch/Tag:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "- **Go Version:** \`$(go env GOVERSION)\`" >> $GITHUB_STEP_SUMMARY
                  echo "- File binary telah siap untuk di-deploy ke production." >> $GITHUB_STEP_SUMMARY

            - name: 💾 Save Binary Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: userbot-binary-linux
                  path: bin/userbot-promotion
                  retention-days: 7

    release:
        name: 🚀 Publish Release
        needs: build
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: 📥 Download Binary Artifact
              uses: actions/download-artifact@v4
              with:
                  name: userbot-binary-linux
                  path: bin/

            - name: 📦 Upload to GitHub Releases
              uses: softprops/action-gh-release@v2
              with:
                  files: bin/userbot-promotion
                  generate_release_notes: true
                  name: Release ${{ github.ref_name }}
                  body: |
                      ### 🚀 Update Terbaru: `${{ github.ref_name }}`

                      Binary statis Linux (amd64) sudah di-compile secara otomatis dan siap untuk digunakan di server/VPS.

                      **Cara Update di Server:**
                      \`\`\`bash
                      cd /opt/userbot-promotion
                      wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/userbot-promotion -O bin/userbot-promotion
                      chmod +x bin/userbot-promotion
                      systemctl restart userbot-promotion
                      \`\`\`
